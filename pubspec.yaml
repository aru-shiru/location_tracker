name: location_tracker
description: "Flutter location tracker with foreground, background, and terminated-state tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Native background location tracking on iOS and Android. Handles
  # permissions, foreground/background/terminated states, and the
  # persistent notification on Android.
  flutter_background_geolocation: ^5.2.0

  # Reactive, type-safe SQLite persistence for logged location records.
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.0

  # State management.
  flutter_riverpod: ^3.3.1

  # Date/time formatting in the UI.
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # drift code generation.
  drift_dev: ^2.33.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
